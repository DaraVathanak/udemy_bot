services:
  - type: worker
    name: udemy-free-bot
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python udemy_free_webhook.py
    envVars:
      - key: DISCORD_WEBHOOK_URL
        sync: false       # set manually in Render dashboard
      - key: DATABASE_URL
        sync: false       # set manually in Render dashboard (from Supabase)
      - key: POLL_SECONDS
        value: "900"      # check every 15 minutes
      - key: MAX_DETAILS_PER_RUN
        value: "40"