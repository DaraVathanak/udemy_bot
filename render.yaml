services:
  - type: worker
    name: udemy-discord-bot
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: DISCORD_WEBHOOK_URL
        sync: false
      - key: SOURCE_URL
        value: https://www.udemyfreebies.com/
      - key: POLL_SECONDS
        value: 900
      - key: DB_PATH
        value: seen.sqlite3
      - key: MAX_DETAILS_PER_RUN
        value: 40