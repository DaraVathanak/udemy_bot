name: Udemy Bot

on:
  workflow_dispatch:
    inputs:
      source_url:
        description: "Source page to scrape"
        required: false
        default: "https://www.udemyfreebies.com/"
      max_details_per_run:
        description: "How many detail links to scan per run"
        required: false
        default: "40"

  schedule:
    - cron: "*/15 * * * *"
      timezone: "Asia/Phnom_Penh"

permissions:
  contents: read

concurrency:
  group: udemy-bot
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate secrets
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "Missing required secret: DISCORD_WEBHOOK_URL"
            exit 1
          fi
          if [ -z "$DATABASE_URL" ]; then
            echo "Missing required secret: DATABASE_URL"
            exit 1
          fi

      - name: Run bot once
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SOURCE_URL: ${{ github.event.inputs.source_url || 'https://www.udemyfreebies.com/' }}
          MAX_DETAILS_PER_RUN: ${{ github.event.inputs.max_details_per_run || '40' }}
          RUN_ONCE: "1"
        run: python udemy_free_webhook.py